name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read package version
        id: version
        run: |
          version="$(python3 -c 'import json; print(json.load(open("package.json"))["version"])')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Check whether release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          elif git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.archive_target }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bun_target: bun-linux-x64
            archive_target: x86_64-unknown-linux-gnu
          - os: macos-26-intel
            bun_target: ""
            archive_target: x86_64-apple-darwin
          - os: macos-26
            bun_target: ""
            archive_target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        env:
          BUN_TARGET: ${{ matrix.bun_target }}
        run: |
          if [ -n "$BUN_TARGET" ]; then
            bun build src/main.ts --compile --target "$BUN_TARGET" --outfile dist/keyloop
          else
            bun build src/main.ts --compile --outfile dist/keyloop
          fi

      - name: Smoke release binary
        timeout-minutes: 1
        run: |
          ./dist/keyloop --help >/dev/null
          tmp="$(mktemp -d)"
          KEYLOOP_HOME="$tmp" ./dist/keyloop sources >/dev/null
          rm -rf "$tmp"

      - name: Package archive
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET: ${{ matrix.archive_target }}
        run: |
          archive="keyloop-${VERSION}-${TARGET}.tar.gz"
          mkdir -p "dist/keyloop-${VERSION}-${TARGET}"
          cp dist/keyloop "dist/keyloop-${VERSION}-${TARGET}/"
          cp README.md LICENSE "dist/keyloop-${VERSION}-${TARGET}/"
          cp -R contents "dist/keyloop-${VERSION}-${TARGET}/"
          tar -C dist -czf "$archive" "keyloop-${VERSION}-${TARGET}"
          shasum -a 256 "$archive" > "${archive}.sha256"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.archive_target }}
          path: |
            keyloop-${{ needs.prepare.outputs.version }}-${{ matrix.archive_target }}.tar.gz
            keyloop-${{ needs.prepare.outputs.version }}-${{ matrix.archive_target }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release and Homebrew formula
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
      GH_TOKEN: ${{ github.token }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: package-*
          path: release-artifacts
          merge-multiple: true

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        run: |
          gh release create "$TAG" release-artifacts/* \
            --title "KeyLoop $TAG" \
            --notes "Automated KeyLoop release for version ${VERSION}."

      - name: Update Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          linux_sha="$(cut -d ' ' -f 1 "release-artifacts/keyloop-${VERSION}-x86_64-unknown-linux-gnu.tar.gz.sha256")"
          mac_x86_sha="$(cut -d ' ' -f 1 "release-artifacts/keyloop-${VERSION}-x86_64-apple-darwin.tar.gz.sha256")"
          mac_arm_sha="$(cut -d ' ' -f 1 "release-artifacts/keyloop-${VERSION}-aarch64-apple-darwin.tar.gz.sha256")"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/luweiCN/homebrew-keyloop.git" homebrew-keyloop
          mkdir -p homebrew-keyloop/Formula
          cat > homebrew-keyloop/Formula/keyloop.rb <<EOF
          class Keyloop < Formula
            desc "Personal terminal typing trainer for programmers"
            homepage "https://github.com/luweiCN/keyloop"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/luweiCN/keyloop/releases/download/${TAG}/keyloop-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${mac_arm_sha}"
              else
                url "https://github.com/luweiCN/keyloop/releases/download/${TAG}/keyloop-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${mac_x86_sha}"
              end
            end

            on_linux do
              url "https://github.com/luweiCN/keyloop/releases/download/${TAG}/keyloop-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${linux_sha}"
            end

            def install
              bin.install "keyloop"
              prefix.install "contents"
            end

            test do
              assert_match "KeyLoop", shell_output("#{bin}/keyloop --help")
              assert_match "github:", shell_output("#{bin}/keyloop sources")
            end
          end
          EOF

          cd homebrew-keyloop
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/keyloop.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula is already up to date."
          else
            git commit -m "Update keyloop to ${TAG}"
            git push origin HEAD:main
          fi

      - name: Homebrew tap skipped
        if: env.HOMEBREW_TAP_TOKEN == ''
        run: |
          echo "HOMEBREW_TAP_TOKEN is not set; skipped Homebrew tap update."

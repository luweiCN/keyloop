name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked --all-targets

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

      - name: Install smoke
        run: |
          root="${RUNNER_TEMP}/keyloop-install"
          cargo install --path . --locked --debug --force --root "$root"
          "$root/bin/keyloop" --help
          KEYLOOP_HOME="$(mktemp -d)" "$root/bin/keyloop" --language en plan
